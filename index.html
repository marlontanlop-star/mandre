<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TERMINAL INTELIGENTE | LA OFICINA</title>
    
    <!-- Traductores para TVs viejos -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/es6-shim/0.35.6/es6-shim.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fetch/3.6.19/fetch.min.js"></script>

    <!-- Tailwind y React (Versiones ultra-estables) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@17/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@17/umd/react-dom.production.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'oficina-verde': '#4b5320',
                        'oficina-claro': '#8FBC8F', 
                        'oficina-dark': '#1a1c0b',
                    },
                    animation: {
                        'float-slow': 'float 6s ease-in-out infinite',
                        'seal-entrance': 'sealPop 1s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards',
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0) rotate(-0.5deg)' },
                            '50%': { transform: 'translateY(-15px) rotate(0.5deg)' },
                        },
                        sealPop: {
                            '0%': { transform: 'scale(0) rotate(-45deg)', opacity: '0' },
                            '100%': { transform: 'scale(1) rotate(0deg)', opacity: '1' },
                        }
                    }
                }
            }
        }
    </script>

    <style>
        body, html { margin: 0; padding: 0; overflow: hidden; background-color: #1a1c0b; cursor: none; font-family: 'Montserrat', sans-serif; height: 100vh; }
        .slide-enter { animation: slideIn 0.8s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .price-tag { text-shadow: 4px 4px 0px rgba(75, 83, 32, 0.2); }
        .bg-pattern { background-color: #e3e4d4; background-image: radial-gradient(#4b5320 0.5px, transparent 0.5px); background-size: 30px 30px; }
        .tv-container { height: 100vh; width: 50vw; padding: 5vh 4vw; display: flex; flex-direction: column; box-sizing: border-box; overflow: hidden; }
        .no-word-break { white-space: normal; word-break: keep-all; overflow-wrap: normal; display: block; }
        .coffee-bag { background: linear-gradient(145deg, #1a1c0b 0%, #070803 100%); border: 1px solid rgba(143, 188, 143, 0.1); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/javascript">
        var el = React.createElement;
        
        // Helper para "limpiar" la respuesta rara de la API REST de Google
        function flattenFirebase(fields) {
            var obj = {};
            for (var key in fields) {
                var val = fields[key];
                if (val.stringValue) obj[key] = val.stringValue;
                else if (val.integerValue) obj[key] = parseInt(val.integerValue);
                else if (val.doubleValue) obj[key] = parseFloat(val.doubleValue);
                else if (val.booleanValue !== undefined) obj[key] = val.booleanValue;
            }
            return obj;
        }

        function AdsDisplay() {
            var itemsState = React.useState([]);
            var items = itemsState[0];
            var setItems = itemsState[1];

            var configState = React.useState(null);
            var tvConfig = configState[0];
            var setTvConfig = configState[1];

            var indexState = React.useState(0);
            var currentIndex = indexState[0];
            var setCurrentIndex = indexState[1];

            var fullState = React.useState(false);
            var isFullscreen = fullState[0];
            var setIsFullscreen = fullState[1];

            // Carga de datos mediante API REST (Mucho más ligero para TV)
            React.useEffect(function() {
                function fetchData() {
                    // Cargar Inventario
                    fetch('https://firestore.googleapis.com/v1/projects/mandre-f9e43/databases/(default)/documents/inventory')
                        .then(function(res) { return res.json(); })
                        .then(function(data) {
                            if (data.documents) {
                                var filtered = data.documents.map(function(doc) {
                                    return flattenFirebase(doc.fields);
                                }).filter(function(i) { 
                                    return i.isPromoted === true && i.imageUrl; 
                                });
                                setItems(filtered);
                            }
                        });

                    // Cargar Configuración
                    fetch('https://firestore.googleapis.com/v1/projects/mandre-f9e43/databases/(default)/documents/configuracionTV/actual')
                        .then(function(res) { return res.json(); })
                        .then(function(data) {
                            if (data.fields) setTvConfig(flattenFirebase(data.fields));
                        });
                }

                fetchData();
                var interval = setInterval(fetchData, 60000); // Actualiza cada minuto
                return function() { clearInterval(interval); };
            }, []);

            var totalSlides = items.length > 0 ? items.length + Math.ceil(items.length / 4) : 0;

            React.useEffect(function() {
                if (totalSlides > 0) {
                    var isPromo = (currentIndex + 1) % 5 === 0 || currentIndex === totalSlides - 1;
                    var timer = setTimeout(function() {
                        setCurrentIndex((currentIndex + 1) % totalSlides);
                    }, isPromo ? 20000 : 8000);
                    return function() { clearTimeout(timer); };
                }
            }, [currentIndex, totalSlides]);

            function toggleFull() {
                var d = document.documentElement;
                var r = d.requestFullscreen || d.webkitRequestFullScreen || d.mozRequestFullScreen || d.msRequestFullscreen;
                if (r) r.call(d);
                setIsFullscreen(true);
            }

            if (!isFullscreen) {
                return el("div", { className: "h-screen w-screen flex flex-col items-center justify-center bg-oficina-dark text-white p-10" },
                    el("h2", { className: "text-4xl mb-8 font-black uppercase" }, "Terminal Inteligente Mandré"),
                    el("button", { onClick: toggleFull, className: "bg-oficina-verde px-12 py-6 rounded-full text-2xl font-black border-4 border-white" }, "INICIAR")
                );
            }

            if (items.length === 0) return el("div", { className: "h-screen w-screen flex items-center justify-center bg-oficina-dark text-white text-2xl" }, "Sincronizando...");

            var isPromoSlide = (currentIndex + 1) % 5 === 0 || currentIndex === totalSlides - 1;
            var current = items[(currentIndex - Math.floor((currentIndex + 1) / 5)) % items.length];

            if (isPromoSlide) {
                return el("div", { className: "h-screen w-screen bg-[#070803] flex items-center justify-center p-10 slide-enter" },
                    el("div", { className: "flex w-full h-full items-center gap-8" },
                        el("div", { className: "w-1/2 flex flex-col space-y-6" },
                            el("div", { className: "border-l-[1.2vw] border-oficina-claro pl-8" },
                                el("p", { className: "text-[1.8vw] text-oficina-claro font-black uppercase" }, "Café de Especialidad"),
                                el("h2", { className: "text-[4.5vw] font-black text-white uppercase leading-none" }, "Anserma, Caldas"),
                                el("p", { className: "text-[1.8vw] text-oficina-claro font-black uppercase tracking-widest" }, "Trazabilidad Total")
                            ),
                            el("p", { className: "text-[2vw] text-gray-300 italic" }, "\"El esfuerzo de nuestros campesinos en cada taza.\"")
                        ),
                        el("div", { className: "w-1/2 flex justify-center" },
                            el("div", { className: "w-[36vw] h-[80vh] coffee-bag rounded-3xl flex flex-col items-center p-12 animate-float-slow border border-oficina-claro/30" },
                                el("div", { className: "w-40 h-40 bg-white rounded-full flex items-center justify-center mb-8" }, el("img", {src: "https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=laoficina", className: "w-32"})),
                                el("div", { className: "bg-oficina-claro p-6 rounded-2xl w-full text-center" }, 
                                    el("p", {className:"text-oficina-dark font-black text-[1.5vw]"}, "SÍGUENOS"),
                                    el("p", {className:"text-oficina-dark font-bold"}, "@laoficinaanserma")
                                )
                            )
                        )
                    )
                );
            }

            return el("div", { className: "h-screen w-screen bg-pattern flex overflow-hidden" },
                el("div", { className: "w-1/2 tv-container z-10" },
                    el("span", { className: "bg-oficina-verde text-white px-4 py-2 rounded text-[1.4vw] font-bold uppercase" }, current.category),
                    el("div", { className: "flex-grow flex flex-col justify-center" },
                        el("h1", { className: "text-[6vw] font-black text-oficina-dark leading-none uppercase" }, current.name),
                        el("p", { className: "text-[2.2vw] text-oficina-verde/90 font-bold mt-4" }, current.description || "Experiencia premium.")
                    ),
                    el("div", { className: "mt-auto" },
                        el("div", { className: "text-[7.5vw] font-black text-oficina-verde price-tag" }, "$" + (current.price || 0).toLocaleString()),
                        el("div", { className: "border-t-4 border-oficina-verde pt-4 flex items-center gap-4" },
                            el("img", { src: "https://api.qrserver.com/v1/create-qr-code/?size=100x100&data=laoficina", className: "w-20" }),
                            el("p", { className: "text-[2vw] font-black text-oficina-verde" }, "@laoficinaanserma")
                        )
                    )
                ),
                el("div", { className: "w-1/2 relative h-full" },
                    el("img", { key: currentIndex, src: current.imageUrl, className: "h-full w-full object-cover slide-enter" }),
                    el("div", { className: "absolute inset-0 bg-gradient-to-r from-[#e3e4d4] w-[15%]" })
                )
            );
        }

        ReactDOM.render(el(AdsDisplay), document.getElementById('root'));
    </script>
</body>
</html>
