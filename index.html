        // --- FUNCIÓN HELPER FIREBASE ---
        const syncCollection = (collectionName, initialData, stateSetter) => {
            return db.collection(collectionName).onSnapshot(snap => {
                if (snap.empty && initialData) {
                    const batch = db.batch();
                    initialData.forEach(item => {
                        const ref = db.collection(collectionName).doc(item.id.toString());
                        batch.set(ref, item);
                    });
                    batch.commit();
                } else {
                    stateSetter(snap.docs.map(doc => doc.data()));
                }
            });
        };

        const App = () => {
            // --- ESTADOS CONEXIÓN ---
            const [isOnline, setIsOnline] = useState(navigator.onLine);
            const [isFirebaseConnected, setIsFirebaseConnected] = useState(false);

            // --- ESTADOS GLOBALES ---
            const [view, setView] = useState('start'); 
            const [inventory, setInventory] = useState([]);

            // POS

            const [activeTableId, setActiveTableId] = useState(null);

            const [showMobileCart, setShowMobileCart] = useState(false); 
            const [isPaymentModalOpen, setIsPaymentModalOpen] = useState(false);

            const [isOpenProductModalOpen, setIsOpenProductModalOpen] = useState(false);
            const [manualProduct, setManualProduct] = useState({ name: '', price: '' });

            const [paymentStep, setPaymentStep] = useState('method');
            const [tempProduct, setTempProduct] = useState(null);
            const [modifiers, setModifiers] = useState({ milk: MODIFIERS_DATA.milk[0], sugar: MODIFIERS_DATA.sugar[0], extras: [], serviceType: 'vajilla' });
            const [cashGiven, setCashGiven] = useState('');
            const [adminPass, setAdminPass] = useState('');
            const [isProcessingPayment, setIsProcessingPayment] = useState(false);

            // --- SINCRONIZACIÓN FIREBASE (REALTIME) ---
            useEffect(() => {
                // Monitoreo de Red
                const handleOnline = () => setIsOnline(true);
                const handleOffline = () => setIsOnline(false);
                window.addEventListener('online', handleOnline);
                window.addEventListener('offline', handleOffline);

                // Monitoreo Firebase
                const unsubConnection = db.collection('inventory').onSnapshot({ includeMetadataChanges: true }, (snap) => {
                    setIsFirebaseConnected(!snap.metadata.fromCache);
                });

                // Carga de Colecciones
                const unsubInv = syncCollection('inventory', INITIAL_INVENTORY, setInventory);
                const unsubRaw = syncCollection('rawMaterials', INITIAL_RAW_MATERIALS, setRawMaterials);
                const unsubDisp = syncCollection('disposables', INITIAL_DISPOSABLES, setDisposables);
                const unsubComb = syncCollection('combos', INITIAL_COMBOS, setCombos);
                const unsubUsers = syncCollection('users', INITIAL_USERS, setUsers);
                
                const initTables = Array.from({ length: 8 }, (_, i) => ({ id: i + 1, status: 'libre', orderId: null, currentTotal: 0 }));
                const unsubTables = syncCollection('tables', initTables, setTables);

                // Carga de Históricos
                const unsubOrders = db.collection('orders').orderBy('id', 'desc').onSnapshot(snap => setOrders(snap.docs.map(d => d.data())));
                const unsubShifts = db.collection('shifts').orderBy('id', 'desc').onSnapshot(snap => setShifts(snap.docs.map(d => d.data())));
                const unsubInvoices = db.collection('supplierInvoices').orderBy('id', 'desc').onSnapshot(snap => setSupplierInvoices(snap.docs.map(d => d.data())));
                
                const unsubActiveOrders = db.collection('activeOrders').onSnapshot(snap => {
                    const data = {};
                    snap.docs.forEach(d => data[d.id] = d.data());
                    setActiveOrders(data);
                });

                // AUTOMATIC MIDNIGHT CLOSURE CHECK
                const checkMidnightClosure = setInterval(() => {
                    const now = new Date();
                    // Si es exactamente media noche (00:00) y segundos 0-30 para dar margen
                    if (now.getHours() === 0 && now.getMinutes() === 0) {
                        performClosure(true); // Flag de cierre automatico
                    }
                }, 60000); // Check cada minuto

                return () => {
                    window.removeEventListener('online', handleOnline);
                    window.removeEventListener('offline', handleOffline);
                    clearInterval(checkMidnightClosure);
                    unsubConnection();
                    unsubInv(); unsubRaw(); unsubDisp(); unsubComb(); unsubUsers(); unsubTables();
                    unsubOrders(); unsubShifts(); unsubInvoices(); unsubActiveOrders();
                };
            }, []);

            // --- COMPUTADOS ---
            const categories = ["Calientes", "Frías", "Fit-Pastry", "Bowls", "Combos", "Retail"];
            
            const displayInventory = useMemo(() => {
                return [...inventory, ...combos];
            }, [inventory, combos]);

            const calculateItemTotal = (item) => {
                let total = item.price;
                if (item.modifiers) {
                    if (item.modifiers.milk && item.modifiers.milk.price) total += item.modifiers.milk.price;
                    if (item.modifiers.sugar && item.modifiers.sugar.price) total += item.modifiers.sugar.price;
                    if (item.modifiers.extras) item.modifiers.extras.forEach(e => total += e.price);
                }
                return total * item.quantity;
            };

            // ACTUALIZACION: TOTAL = SUBTOTAL (SIN IMPUESTOS)
            const subtotal = useMemo(() => cart.reduce((acc, item) => acc + calculateItemTotal(item), 0), [cart]);
            const total = useMemo(() => subtotal, [subtotal]);
            
            const changeDue = useMemo(() => {
                const given = parseFloat(cashGiven) || 0;
                return given >= total ? given - total : 0;
            }, [cashGiven, total]);

            // --- FUNCIONES LOGIN ---
            const handleLogin = (e) => {

            // --- FUNCIONES CIERRE DE CAJA ---
            const openClosureModal = () => {

            };

            const handleCashCountChange = (id, qty) => {
                setCashCountDetails(prev => ({ ...prev, [id]: parseInt(qty) || 0 }));
            };

            const calculateCountedTotal = () => {
                return DENOMINATIONS.reduce((acc, curr) => {
                    return acc + (curr.value * (cashCountDetails[curr.id] || 0));
                }, 0);
            };

            const performClosure = async (isAuto = false) => {
                const currentShiftOrders = orders.filter(o => !o.shiftId);
                
                // Si no hay ordenes y es automatico, no cerrar nada o cerrar en cero
                if (isAuto && currentShiftOrders.length === 0) return;

                const expectedCash = currentShiftOrders
                    .filter(o => o.method === 'efectivo')
                    .reduce((acc, o) => acc + o.total, 0);

                const bankTotals = {};
                currentShiftOrders
                    .filter(o => o.method === 'transferencia')
                    .forEach(o => {
                        bankTotals[o.detail] = (bankTotals[o.detail] || 0) + o.total;
                    });

                const manualItems = [];
                currentShiftOrders.forEach(order => {
                    order.items.forEach(item => {
                        if (item.id.toString().startsWith('manual_')) {
                            manualItems.push({ 
                                date: order.date, 
                                name: item.name, 
                                price: item.price, 
                                qty: item.quantity 
                            });
                        }
                    });
                });

                // Si es automatico, el contado se asume 0 o igual al esperado (aqui asumimos 0 efectivo fisico contado en auto)
                // Ojo: En cierre auto, la diferencia será negativa si hubo efectivo.
                const countedCash = isAuto ? 0 : calculateCountedTotal();
                const diff = countedCash - expectedCash;
                const employeeName = isAuto ? "Automático Sistema" : (currentShiftEmployee || "Admin");

                const result = {
                    id: Date.now(),
                    date: new Date().toLocaleString(),
                    employee: employeeName,
                    expected: expectedCash,
                    counted: countedCash,
                    diff: diff,
                    ordersCount: currentShiftOrders.length,
                    bankTotals: bankTotals,
                    manualItems: manualItems,
                    isAuto: isAuto
                };

                const batch = db.batch();
                // Guardar turno
                batch.set(db.collection('shifts').doc(result.id.toString()), result);
                
                // Marcar ordenes en la nube
                currentShiftOrders.forEach(o => {
                    const ref = db.collection('orders').doc(o.id.toString());
                    batch.update(ref, { shiftId: result.id });
                });

                await batch.commit();
                
                if(!isAuto) {
                    setClosureResult(result);
                }
            };

            const deleteShift = async (id) => {
                if(confirm("¿Estás seguro de eliminar este reporte de cierre permanentemente?")) {
                    await db.collection('shifts').doc(id.toString()).delete();
                }
            };

            const shareClosureReport = async () => {
                if (closureReportRef.current) {
                    try {
                        const canvas = await html2canvas(closureReportRef.current, { scale: 2, backgroundColor: '#ffffff' });
                        canvas.toBlob(async (blob) => {
                            const file = new File([blob], `Cierre_${Date.now()}.png`, { type: 'image/png' });
                            
                            if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
                                await navigator.share({
                                    files: [file],
                                    title: 'Reporte Cierre MANDRÉ',
                                    text: `Cierre de caja realizado por ${currentShiftEmployee}`
                                });
                            } else {
                                const link = document.createElement('a');
                                link.download = `Cierre_${Date.now()}.png`;
                                link.href = canvas.toDataURL();
                                link.click();
                                alert("Imagen descargada. Compártela manualmente desde tu galería.");
                            }
                        });
                    } catch (err) {
                        console.error("Error compartiendo:", err);
                        alert("No se pudo compartir. Descargando imagen...");
                    }
                }
            };

            // --- GESTION USUARIOS ADMIN ---
            const createNewUser = async () => {
                const { name, surname, emailPrefix, username, password } = newUserForm;
                if(!name || !surname || !emailPrefix || !username || !password) return alert("Complete todos los campos del usuario");
                
                const newUser = {
                    id: Date.now(),
                    name,
                    surname,
                    email: `${emailPrefix}@mandre.com`,
                    username,
                    password
                };
                
                await db.collection('users').doc(newUser.id.toString()).set(newUser);
                setNewUserForm({ name: '', surname: '', emailPrefix: '', username: '', password: '' });
                alert("Usuario Creado Exitosamente en Firebase");
            };

            // --- GESTION PRODUCTOS ADMIN ---
            const createNewProduct = async () => {
                if(!newProductForm.name || !newProductForm.price) return alert("Complete nombre y precio");
                const newItem = {
                    id: Date.now(),
                    name: newProductForm.name,
                    price: parseFloat(newProductForm.price),
                    category: newProductForm.category,
                    stock: 999, 
                    disposables: [],
                    icon: newProductForm.icon
                };
                await db.collection('inventory').doc(newItem.id.toString()).set(newItem);
                setNewProductForm({ name: '', price: '', category: 'Calientes', icon: '☕' });
                alert("Producto Creado Exitosamente en Firebase");
            };

            // --- FUNCIONES COMPRAS & INVENTARIO ADMIN ---
            const addPurchaseItem = () => {
                setPurchaseForm({
                    ...purchaseForm,
                    items: [...purchaseForm.items, { name: '', qty: '', unit: 'und', price: '', type: 'materia' }]
                });
            };

            const updatePurchaseItem = (index, field, value) => {
                const newItems = [...purchaseForm.items];
                newItems[index][field] = value;
                setPurchaseForm({ ...purchaseForm, items: newItems });
            };

            const removePurchaseItem = (index) => {
                const newItems = purchaseForm.items.filter((_, i) => i !== index);
                setPurchaseForm({ ...purchaseForm, items: newItems });
            };

            const saveSupplierInvoice = async () => {
                const { supplier, date, items } = purchaseForm;
                if (!supplier || items.some(i => !i.name || !i.qty || !i.price)) {
                    return alert("Por favor complete todos los campos de la factura.");
                }

                const invoiceTotal = items.reduce((acc, i) => acc + (parseFloat(i.qty) * parseFloat(i.price)), 0);
                const newInvoice = { id: Date.now(), supplier, date, total: invoiceTotal, items, employee: currentShiftEmployee };
                
                const batch = db.batch();
                batch.set(db.collection('supplierInvoices').doc(newInvoice.id.toString()), newInvoice);

                // Lógica Robustecida de Actualización de Stock
                items.forEach(item => {
                    const qty = parseFloat(item.qty);
                    let collectionName = '';
                    let existingItem = null;

                    if (item.type === 'materia') {
                        collectionName = 'rawMaterials';
                        existingItem = rawMaterials.find(r => r.name.toLowerCase() === item.name.toLowerCase());
                    } else if (item.type === 'insumo') {
                        collectionName = 'disposables';
                        existingItem = disposables.find(r => r.name.toLowerCase() === item.name.toLowerCase());
                    } else {
                        collectionName = 'inventory';
                        existingItem = inventory.find(r => r.name.toLowerCase() === item.name.toLowerCase());
                    }

                    if (existingItem) {
                        const ref = db.collection(collectionName).doc(existingItem.id.toString());
                        batch.update(ref, { stock: existingItem.stock + qty });
                    } else {
                        // Crear si no existe
                        const newId = (item.type === 'materia' ? 'raw' : item.type === 'insumo' ? 'd' : '') + Date.now() + Math.floor(Math.random() * 100);
                        const newItemData = { 
                            id: newId, 
                            name: item.name, 
                            stock: qty, 
                            unit: item.unit || 'und'
                        };
                        if(item.type === 'retail') {
                            newItemData.price = parseFloat(item.price) * 1.5; // Margen automático sugerido
                            newItemData.category = 'Retail';
                            newItemData.disposables = [];
                        }
                        batch.set(db.collection(collectionName).doc(newId.toString()), newItemData);
                    }
                });

                try {
                    await batch.commit();
                    setPurchaseForm({
                        supplier: '',
                        date: new Date().toISOString().split('T')[0],
                        items: [{ name: '', qty: '', unit: 'und', price: '', type: 'materia' }]
                    });
                    alert("Factura guardada en la Nube y stock actualizado sincronizadamente.");
                } catch (error) {
                    console.error("Error al guardar factura:", error);
                    alert("Hubo un error al guardar la factura. Verifique su conexión.");
                }
            };

            const deleteInventoryItem = async (type, id) => {
                if(!confirm("¿Seguro que desea eliminar este ítem de Firebase?")) return;
                const col = type === 'raw' ? 'rawMaterials' : type === 'disposable' ? 'disposables' : 'inventory';
                await db.collection(col).doc(id.toString()).delete();
            };

            const startEditingItem = (type, item) => {
                setEditItem({ type, data: {...item} });
            };

            const saveEditedItem = async () => {
                if(!editItem) return;
                const { type, data } = editItem;
                const col = type === 'raw' ? 'rawMaterials' : type === 'disposable' ? 'disposables' : 'inventory';
                
                await db.collection(col).doc(data.id.toString()).update(data);
                setEditItem(null);
            };

            // LOGICA COMBOS
            const handleCreateCombo = async () => {
                if (!newCombo.name || !newCombo.price || newCombo.items.length === 0) return alert("Faltan datos");
                const combo = {
                    id: Date.now(),
                    name: newCombo.name,
                    price: parseFloat(newCombo.price),
                    category: 'Combos',
                    stock: 999, 
                    items: newCombo.items,
                    disposables: []

                await db.collection('combos').doc(combo.id.toString()).set(combo);
                setNewCombo({ name: '', price: '', items: [] });
                alert("Combo Guardado en la Nube");
            };

            const toggleItemInCombo = (id) => {
                if (newCombo.items.includes(id)) {
                    setNewCombo({...newCombo, items: newCombo.items.filter(i => i !== id)});
                } else {
                    setNewCombo({...newCombo, items: [...newCombo.items, id]});
                }
            };

            // --- FUNCIONES POS ---
            const handleModifierChange = (type, value) => {
                if (type === 'extras') {
                    const exists = modifiers.extras.find(e => e.id === value.id);
                    if (exists) {
                        setModifiers({...modifiers, extras: modifiers.extras.filter(e => e.id !== value.id)});
                    } else {
                        setModifiers({...modifiers, extras: [...modifiers.extras, value]});
                    }
                } else {
                    setModifiers({ ...modifiers, [type]: value });
                }
            };

            const selectTable = (id) => {
                const table = tables.find(t => t.id === id);
                if (table.status === 'ocupada') {
                    if (activeOrders[id]) {
                        setCart(activeOrders[id].items);
                        setCustomerName(activeOrders[id].customer);
                    }
                } else {
                    setCart([]);
                    setCustomerName('');
                }
                setActiveTableId(id);
                setOrderType('mesa');
                setServiceSelected(true);
            };

            const selectOtherService = (type) => {
                setActiveTableId(null);
                setOrderType(type);
                setCart([]);
                setCustomerName('');
                setServiceSelected(true);
            };

            const exitServiceMode = () => {
                setServiceSelected(false);
                setCart([]);
                setActiveTableId(null);
                setOrderType('');
                setShowMobileCart(false);
            };

            const initAddToCart = (product) => {
                // RESTAURACIÓN LOGICA RETAIL: Si es Retail, no pide modificadores
                if (product.category === 'Retail') {
                     addToCartFinal(product, { serviceType: 'desechable' });
                     return;
                }
                setTempProduct(product);
                // Reset modifiers for new product
                setModifiers({ 
                    milk: MODIFIERS_DATA.milk[0], 
                    sugar: MODIFIERS_DATA.sugar[0], 
                    extras: [],
                    serviceType: orderType === 'llevar' || orderType === 'domicilio' ? 'desechable' : 'vajilla'
                });
                setIsModifierModalOpen(true);
            };

            const addToCartFinal = (product, mods) => {
                const newItem = {
                    ...product,
                    cartId: Date.now(),
                    quantity: 1,
                    modifiers: mods || { serviceType: 'desechable' }
                };
                setCart([...cart, newItem]);
                setIsModifierModalOpen(false);
                setTempProduct(null);
            };

            // PRODUCTO MANUAL
            const addManualProduct = () => {
                if(!manualProduct.name || !manualProduct.price) return alert("Ingrese nombre y precio");
                const newItem = {
                    id: 'manual_' + Date.now(),
                    name: manualProduct.name,
                    price: parseFloat(manualProduct.price),
                    category: 'Otros',
                    quantity: 1,
                    cartId: Date.now(),
                    modifiers: { serviceType: orderType === 'llevar' ? 'desechable' : 'vajilla', extras: [] }
                };
                setCart([...cart, newItem]);
                setIsOpenProductModalOpen(false);
                setManualProduct({ name: '', price: '' });
            };

            const removeFromCart = (cartId) => {
                setCart(cart.filter(item => item.cartId !== cartId));
            };

            const sendToKitchen = async () => {
                // Nombre siempre opcional salvo para pagar luego en mesa (para identificar)
                //if (orderType === 'mesa' && !customerName) return alert("Para mesas, el nombre es útil para identificar la cuenta.");
                
                if (cart.length === 0) return alert("Carrito vacío");

                if (orderType === 'mesa' && activeTableId) {
                    const batch = db.batch();
                    
                    batch.update(db.collection('tables').doc(activeTableId.toString()), { status: 'ocupada', currentTotal: total });
                    batch.set(db.collection('activeOrders').doc(activeTableId.toString()), {
                        items: cart, customer: customerName || "Mesa " + activeTableId, subtotal, total
                    });

                    await batch.commit();
                    alert(`Mesa ${activeTableId} Actualizada en la Nube.`);
                    setServiceSelected(false);
                    setShowMobileCart(false);
                } else {
                    openPaymentModal();
                }
            };

            const openPaymentModal = () => {
                setPaymentStep('method');
                setCashGiven('');
                // Limpiar nombre si no es mesa
                if(orderType !== 'mesa') setCustomerName(''); 
                setIsProcessingPayment(false); // Resetear estado de procesamiento
                setIsPaymentModalOpen(true);
            };

            const handleFinalizePayment = async (method, detail) => {
                // Validación Datáfono
                if (method === 'datáfono') {
                    return alert("Función No Activada");
                }

                // Validación para evitar doble clic
                if (isProcessingPayment) return;

                // Validación Nombre Cliente obligatorio SOLO si es Transferencia
                if (method === 'transferencia' && !customerName.trim()) {
                    alert("Para pagos por Transferencia, el Nombre del Cliente es obligatorio.");
                    return;
                }

                // Vibración al dar clic
                if (navigator.vibrate) {
                    navigator.vibrate(100);
                }

                setIsProcessingPayment(true); // Bloquear botones

                const finalCustomerName = customerName.trim() || "Cliente General";
                const batch = db.batch();

                // 1. Deducir Inventario en Firestore (Lógica restaurada de Ventas)
                cart.forEach(item => {
                    if (item.category === 'Combos') {
                        item.items.forEach(subItemId => {
                             const idx = inventory.findIndex(p => p.id === subItemId);
                             if(idx !== -1) {
                                 const ref = db.collection('inventory').doc(subItemId.toString());
                                 batch.update(ref, { stock: inventory[idx].stock - item.quantity });
                             }
                        });
                    } else if (item.category !== 'Otros') {
                        const idx = inventory.findIndex(p => p.id === item.id);
                        if(idx !== -1) {
                            const ref = db.collection('inventory').doc(item.id.toString());
                            batch.update(ref, { stock: inventory[idx].stock - item.quantity });
                        }
                    }
                });

                // 2. Deducir Desechables en Firestore
                const disposablesToDeduct = {};
                cart.forEach(item => {
                    if (item.modifiers && item.modifiers.serviceType === 'desechable') {
                         if (item.disposables) {
                            item.disposables.forEach(dId => {
                                disposablesToDeduct[dId] = (disposablesToDeduct[dId] || 0) + item.quantity;
                            });
                        }
                    }
                    if (item.category === 'Fit-Pastry' && item.modifiers?.serviceType === 'desechable') {
                        disposablesToDeduct['d7'] = (disposablesToDeduct['d7'] || 0) + item.quantity;
                    }
                });

                Object.entries(disposablesToDeduct).forEach(([dId, qty]) => {
                    const dItem = disposables.find(d => d.id === dId);
                    if(dItem) {
                        const ref = db.collection('disposables').doc(dId.toString());
                        batch.update(ref, { stock: dItem.stock - qty });
                    }
                });

                // 3. Registrar Orden en Firebase
                const newOrder = { 
                    id: Date.now(), 
                    date: new Date().toLocaleTimeString(), 
                    fullDate: new Date().toLocaleDateString(),
                    total, 
                    method, 
                    detail, 
                    customer: finalCustomerName, 
                    items: cart,
                    employee: currentShiftEmployee 
                };
                batch.set(db.collection('orders').doc(newOrder.id.toString()), newOrder);
                
                // 4. Limpiar Mesas
                if(activeTableId) {
                    batch.update(db.collection('tables').doc(activeTableId.toString()), { status: 'libre', currentTotal: 0 });
                    batch.delete(db.collection('activeOrders').doc(activeTableId.toString()));
                }

                try {
                    await batch.commit();
                    setCart([]);
                    setCustomerName('');
                    setIsPaymentModalOpen(false);
                    setServiceSelected(false);
                    setShowMobileCart(false);
                    setCashGiven('');
                    setIsProcessingPayment(false); // Desbloquear (aunque se cierra el modal)
                    alert("¡Venta Sincronizada y Cerrada con Éxito!");
                } catch (error) {
                    console.error("Error en transacción:", error);
                    alert("Error de conexión. Intente nuevamente.");
                    setIsProcessingPayment(false); // Desbloquear si falla
                }
            };

            return (
                <div className="h-[100dvh] flex flex-col bg-mandre-bone font-sans text-mandre-dark overflow-hidden">
                    
                    {/* TOP HEADER */}
                    <header className="bg-white px-4 py-3 flex justify-between items-center shadow-sm z-20 shrink-0">
                        <div className="flex items-center gap-3">
                            {/* SEÑALES DE CONEXIÓN */}
                            <div className="flex flex-col items-end gap-1.5 mr-2 border-r pr-4 border-gray-100">
                                <div className="flex items-center gap-2" title="Conexión de Internet">
                                    <div className={`w-2 h-2 rounded-full ${isOnline ? 'bg-green-500 shadow-[0_0_5px_#22c55e]' : 'bg-red-500 animate-pulse'}`}></div>
                                    <span className="text-[8px] font-bold text-gray-400 uppercase tracking-widest">Red</span>
                                </div>
                                <div className="flex items-center gap-2" title="Conexión Firebase">
                                    <div className={`w-2 h-2 rounded-full ${isFirebaseConnected ? 'bg-blue-500 shadow-[0_0_5px_#3b82f6]' : 'bg-orange-500 animate-pulse'}`}></div>
                                    <span className="text-[8px] font-bold text-gray-400 uppercase tracking-widest">Nube</span>
                                </div>
                            </div>

                            <div className="w-10 h-10 flex items-center justify-center bg-mandre-coffee rounded-full shadow-lg"><IconLeaf /></div>
                            <div>
                                <h1 className="text-xl font-bold tracking-widest text-mandre-coffee">MANDRÉ</h1>
                                <p className="text-[10px] text-gray-400 font-bold uppercase">{currentShiftEmployee || 'Invitado'}</p>
                            </div>
                        </div>
                        <div className="flex items-center gap-2">
                             {serviceSelected && (
                                <button onClick={exitServiceMode} className="text-xs border border-red-200 text-red-500 p-2 rounded-full hover:bg-red-50 transition active:scale-95 flex items-center gap-1 font-bold" title="Guardar y Salir">
                                    <LogOut size={16}/> Salir
                                </button>
                            )}
                            {/* BOTON DE CIERRE DISCRETO */}
                            {view === 'pos' && !serviceSelected && (
                                <button onClick={openClosureModal} className="p-2 hover:bg-red-50 rounded-full text-red-400 transition" title="Cerrar Caja">
                                    <Lock size={20}/>
                                </button>
                            )}
                            <button onClick={() => view === 'admin_panel' ? setView('pos') : setView('admin_login')} className="p-2 hover:bg-gray-100 rounded-full text-mandre-coffee transition">
                                {view === 'admin_panel' ? <IconBase size={20}><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" x2="9" y1="12" y2="12"/></IconBase> : <LayoutDashboard size={20} />}
                            </button>
                        </div>
                    </header>

                    {/* VISTA POS */}
                    {view === 'pos' && (
                        <div className="flex-1 flex overflow-hidden relative">
                            {!serviceSelected ? (
                                <div className="absolute inset-0 z-30 bg-mandre-bone flex flex-col items-center justify-start md:justify-center p-4 pt-10 md:pt-4 animate-fadeIn overflow-y-auto">
                                    <div className="max-w-5xl w-full">
                                        <h2 className="text-xl md:text-2xl font-light text-mandre-coffee mb-6 md:mb-8 text-center">Seleccione Área de Servicio</h2>
                                        <div className="grid grid-cols-1 lg:grid-cols-3 gap-6 pb-10">
                                            <div className="lg:col-span-2 bg-white p-6 rounded-[1.5rem] shadow-xl border border-white/50">
                                                <div className="flex justify-between items-center mb-6">
                                                    <h3 className="text-sm font-bold text-mandre-sage uppercase tracking-wider">Salón Principal</h3>
                                                    <div className="flex gap-2 text-[10px] font-bold uppercase text-gray-400">
                                                        <span className="flex items-center gap-1"><div className="w-2 h-2 rounded-full bg-gray-200"></div> Libre</span>
                                                        <span className="flex items-center gap-1"><div className="w-2 h-2 rounded-full bg-mandre-orange"></div> Ocupada</span>
                                                    </div>
                                                </div>
                                                <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-4">
                                                    {tables.map(table => (
                                                        <button key={table.id} onClick={() => selectTable(table.id)} className={`relative aspect-square rounded-2xl flex flex-col items-center justify-center transition-all duration-300 active:scale-95 group ${table.status === 'libre' ? 'bg-gray-50 border-2 border-transparent text-gray-400 hover:border-mandre-sage/30 hover:text-mandre-sage' : 'bg-mandre-orange text-white shadow-lg shadow-orange-200 scale-105'}`}>
                                                            <div className={`w-10 h-10 md:w-12 md:h-12 rounded-full mb-2 flex items-center justify-center border-2 ${table.status === 'libre' ? 'border-gray-200 group-hover:border-mandre-sage' : 'border-white bg-white/20'}`}><span className="font-bold text-lg">{table.id}</span></div>
                                                            <span className="text-[10px] font-bold uppercase tracking-widest">{table.status}</span>
                                                            {table.status === 'ocupada' && <span className="absolute -top-2 -right-2 bg-red-500 text-white text-[10px] px-2 py-0.5 rounded-full shadow-sm">${table.currentTotal.toLocaleString()}</span>}
                                                        </button>
                                                    ))}
                                                </div>
                                            </div>
                                            <div className="flex flex-col gap-3">
                                                {[{id: 'barra', label: 'BARRA', icon: <Coffee/>}, {id: 'llevar', label: 'PARA LLEVAR', icon: <Box/>}, {id: 'domicilio', label: 'DOMICILIO', icon: <Tag/>}].map(srv => (
                                                    <button key={srv.id} onClick={() => selectOtherService(srv.id)} className="flex-1 bg-white p-4 md:p-6 rounded-3xl shadow-sm active:scale-95 border border-transparent hover:border-mandre-coffee/10 transition group flex items-center justify-between">
                                                        <div className="flex items-center gap-4"><div className="w-10 h-10 md:w-12 md:h-12 rounded-full bg-mandre-bone group-hover:bg-mandre-coffee group-hover:text-white flex items-center justify-center transition text-mandre-coffee">{srv.icon}</div><span className="font-bold text-sm md:text-base text-mandre-dark group-hover:text-mandre-coffee transition">{srv.label}</span></div>
                                                        <div className="text-gray-300 group-hover:text-mandre-coffee">→</div>
                                                    </button>
                                                ))}
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            ) : (
                                <>
                                    <div className="flex-1 flex flex-col overflow-hidden bg-white">
                                        <div className="px-4 py-3 flex gap-2 overflow-x-auto scrollbar-hide border-b shrink-0 items-center">
                                            <button onClick={() => setIsOpenProductModalOpen(true)} className="px-3 py-1.5 rounded-full text-xs font-bold whitespace-nowrap bg-mandre-sage/10 text-mandre-sage border border-mandre-sage/30 flex items-center gap-1 active:scale-95 transition mr-2"><Plus size={14}/> Item Manual</button>
                                            <div className="h-4 w-px bg-gray-200 mx-1"></div>
                                            {categories.map(cat => <button key={cat} onClick={() => setSelectedCategory(cat)} className={`px-4 py-2 rounded-full text-xs font-bold transition-all ${selectedCategory === cat ? 'bg-mandre-coffee text-white' : 'bg-gray-100 text-gray-500'}`}>{cat}</button>)}
                                        </div>
                                        <div className="flex-1 overflow-y-auto p-4 bg-gray-50/50">
                                            <div className="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-4">
                                                {displayInventory.filter(i => i.category === selectedCategory).map(prod => (
                                                    <div key={prod.id} onClick={() => initAddToCart(prod)} className="bg-white p-4 rounded-2xl shadow-sm active:scale-95 transition cursor-pointer flex flex-col items-center text-center">
                                                        <div className="w-16 h-16 bg-mandre-bone rounded-full mb-3 flex items-center justify-center text-2xl">
                                                            {prod.icon || (prod.category === 'Combos' ? '🛍️' : '☕')}
                                                        </div>
                                                        <h3 className="font-bold text-xs text-mandre-coffee mb-1 h-8 flex items-center">{prod.name}</h3>
                                                        <p className="text-mandre-sage font-bold text-xs">${prod.price.toLocaleString()}</p>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>

                    {/* MODAL PAGO */}
                    {isPaymentModalOpen && (
                        <div className="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                            <div className="bg-white rounded-2xl w-full max-w-md shadow-2xl animate-slideUp overflow-hidden max-h-[90vh] flex flex-col">
                                <div className="bg-mandre-coffee p-4 text-white flex justify-between items-center shrink-0">
                                    <h3 className="font-bold text-lg">
                                        {paymentStep === 'method' ? 'Método de Pago' : 
                                         paymentStep === 'cash' ? 'Efectivo' : 'Transferencia'}
                                    </h3>
                                    <button onClick={() => setIsPaymentModalOpen(false)}><X/></button>
                                </div>
                                
                                <div className="p-6 overflow-y-auto">
                                    <div className="text-center mb-6">
                                        <span className="text-sm text-gray-500">Total a Cobrar</span>
                                        <div className="text-4xl font-bold text-mandre-coffee mt-1">${total.toLocaleString()}</div>
                                        {/* NOMBRE SOLO SI ES TRANSFERENCIA */}
                                        {paymentStep === 'transfer' && (
                                            <div className="mt-4 animate-fadeIn">
                                                <input className="w-full p-3 bg-gray-50 border rounded-xl text-center font-bold" placeholder="Nombre Cliente (Obligatorio)" value={customerName} onChange={e => setCustomerName(e.target.value)} autoFocus/>
                                            </div>
                                        )}
                                    </div>

                                    {/* PASO 1: SELECCIÓN MÉTODO */}
                                    {paymentStep === 'method' && (
                                        <div className="space-y-3">
                                            <button onClick={() => setPaymentStep('cash')} className="w-full py-4 bg-mandre-sage/10 border-2 border-mandre-sage text-mandre-coffee font-bold rounded-xl hover:bg-mandre-sage/20 transition flex items-center justify-center gap-3">
                                                <Banknote size={24}/> EFECTIVO
                                            </button>
                                            <button onClick={() => handleFinalizePayment('datáfono', 'Datáfono')} disabled={isProcessingPayment} className="w-full py-4 bg-gray-100 text-gray-400 font-bold rounded-xl hover:bg-gray-200 transition flex items-center justify-center gap-3 disabled:opacity-50">
                                                <CreditCard size={24}/> DATÁFONO
                                            </button>
                                            <button onClick={() => setPaymentStep('transfer')} className="w-full py-4 bg-mandre-coffee text-white font-bold rounded-xl hover:bg-gray-800 transition flex items-center justify-center gap-3 shadow-lg">
                                                <Phone size={24}/> TRANSFERENCIA
                                            </button>
                                        </div>
                                    )}

                                    {/* PASO 2: EFECTIVO */}
                                    {paymentStep === 'cash' && (
                                        <div className="animate-fadeIn">
                                            <div className="mb-4 p-4 bg-gray-50 rounded-xl border border-gray-100">
                                                <input type="number" placeholder="Monto Recibido" value={cashGiven} onChange={e => setCashGiven(e.target.value)} className="w-full bg-transparent text-2xl font-bold outline-none text-center" autoFocus/>
                                                <div className="text-center text-sm text-gray-500 mt-2">Cambio: <span className={`font-bold ${changeDue >= 0 ? 'text-green-600' : 'text-red-500'}`}>${changeDue.toLocaleString()}</span></div>
                                            </div>
                                            <button onClick={() => handleFinalizePayment('efectivo', 'Caja')} disabled={changeDue < 0 || isProcessingPayment} className="w-full py-4 bg-green-600 text-white font-bold rounded-xl shadow-lg disabled:opacity-50">CONFIRMAR PAGO</button>
                                            <button onClick={() => setPaymentStep('method')} className="w-full mt-3 text-gray-400 text-xs">Volver</button>
                                        </div>
                                    )}

                                    {/* PASO 3: TRANSFERENCIA (BANCOS) */}
                                    {paymentStep === 'transfer' && (
                                        <div className="animate-fadeIn">
                                            <p className="text-center text-xs text-gray-400 mb-4 uppercase font-bold tracking-widest">Seleccione Banco</p>
                                            <div className="grid grid-cols-2 gap-3">
                                                {BANKS.map(bank => (
                                                    <button 
                                                        key={bank.id}
                                                        onClick={() => handleFinalizePayment('transferencia', bank.name)}
                                                        disabled={isProcessingPayment}
                                                        className={`${bank.color} h-14 rounded-xl font-bold text-xs shadow-md hover:scale-105 transition-transform flex items-center justify-center animate-bounce-slight disabled:opacity-50 disabled:animate-none`}
                                                        style={{animationDelay: `${Math.random()}s`}}
                                                    >
                                                        {bank.name}
                                                    </button>
                                                ))}
                                            </div>
                                            <button onClick={() => setPaymentStep('method')} className="w-full mt-6 text-gray-400 text-xs">Volver</button>
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>
                    )}

                    {/* VISTA LOGIN INICIAL */}
                    {view === 'start' && (
                        <div className="fixed inset-0 bg-mandre-bone z-50 flex items-center justify-center p-6">
                            <div className="bg-white p-10 rounded-[3rem] shadow-2xl max-w-md w-full text-center animate-slideUp relative">
                                {/* INDICADORES LOGIN */}
                                <div className="absolute top-6 right-8 flex gap-3">
                                    <div className={`w-2 h-2 rounded-full ${isOnline ? 'bg-green-500 shadow-[0_0_5px_#22c55e]' : 'bg-red-500 animate-pulse'}`} title="Internet"></div>
                                    <div className={`w-2 h-2 rounded-full ${isFirebaseConnected ? 'bg-blue-500 shadow-[0_0_5px_#3b82f6]' : 'bg-orange-500 animate-pulse'}`} title="Firebase"></div>
                                </div>

                                <div className="w-20 h-20 bg-mandre-coffee rounded-full flex items-center justify-center mx-auto mb-6 shadow-lg"><IconLeaf /></div>
                                <h1 className="text-3xl font-bold text-mandre-coffee mb-2 tracking-widest">MANDRÉ</h1>
                                <p className="text-gray-400 mb-8 text-sm">Specialty Coffee & Wellness</p>
                                <form onSubmit={handleLogin} className="space-y-4">
                                    <input 
                                        type="text" 
                                        placeholder="Usuario o Correo" 
                                        className="w-full p-5 bg-gray-50 border-2 border-transparent focus:border-mandre-sage rounded-2xl outline-none font-bold text-center" 
                                        value={loginData.identifier} 
                                        onChange={e => setLoginData({...loginData, identifier: e.target.value})} 
                                        autoFocus
                                    />
                                    <input 
                                        type="password" 
                                        placeholder="Contraseña" 
                                        className="w-full p-5 bg-gray-50 border-2 border-transparent focus:border-mandre-sage rounded-2xl outline-none font-bold text-center" 
                                        value={loginData.password} 
                                        onChange={e => setLoginData({...loginData, password: e.target.value})} 
                                    />
                                    <button className="w-full py-5 bg-mandre-coffee text-white font-bold rounded-2xl shadow-lg hover:scale-105 transition">INICIAR SESIÓN</button>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* LOGIN ADMIN */}
                    {view === 'admin_login' && (
                        <div className="fixed inset-0 bg-black/50 backdrop-blur-sm z-50 flex items-center justify-center">
                            <form onSubmit={e => {e.preventDefault(); if(adminPass === '1234') setView('admin_panel'); else alert("PIN Incorrecto")}} className="bg-white p-8 rounded-[2rem] shadow-2xl w-80 text-center">
                                <h2 className="font-bold mb-4">PIN Administrador</h2>
                                <input type="password" value={adminPass} onChange={e => setAdminPass(e.target.value)} className="w-full p-4 bg-gray-50 rounded-2xl text-center text-2xl font-bold mb-4 outline-none focus:border-mandre-sage border-2 border-transparent" maxLength="4" autoFocus/>
                                <button className="w-full py-4 bg-mandre-coffee text-white font-bold rounded-2xl">ENTRAR</button>
                                <button type="button" onClick={() => setView('pos')} className="mt-4 text-xs text-gray-400">Cancelar</button>
                            </form>
                        </div>
                    )}

                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
