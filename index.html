<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TERMINAL INTELIGENTE | LA OFICINA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'oficina-verde': '#4b5320',
                        'oficina-dark': '#1a1c0b',
                    }
                }
            }
        }
    </script>

    <style>
        body, html { 
            margin: 0; 
            padding: 0; 
            overflow: hidden; 
            background-color: #1a1c0b;
            cursor: none;
            font-family: 'Montserrat', sans-serif;
            height: 100vh;
        }
        
        .slide-enter { animation: slideIn 0.8s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        .price-tag { text-shadow: 4px 4px 0px rgba(75, 83, 32, 0.2); }
        
        .bg-pattern {
            background-color: #e3e4d4;
            background-image: radial-gradient(#4b5320 0.5px, transparent 0.5px);
            background-size: 30px 30px;
        }

        .tv-container {
            height: 100vh;
            width: 50vw; 
            padding: 5vh 4vw;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
            overflow: hidden;
        }

        .no-word-break {
            white-space: normal;
            word-break: keep-all;
            overflow-wrap: normal;
            hyphens: none;
            display: block;
        }

        .single-word {
            white-space: nowrap;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyAutOqky0mpVmwDrqFsyZ0zRl_abrzgPvc",
            authDomain: "mandre-f9e43.firebaseapp.com",
            projectId: "mandre-f9e43",
            storageBucket: "mandre-f9e43.firebasestorage.app",
            messagingSenderId: "865403538422",
            appId: "1:865403538422:web:0ee2fb754343de9bc015d7"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const AdsDisplay = () => {
            const [items, setItems] = useState([]);
            const [currentIndex, setCurrentIndex] = useState(0);
            const [isFullscreen, setIsFullscreen] = useState(false);

            useEffect(() => {
                // EL KIOSKO TRAE AUTOMÁTICAMENTE CUALQUIER CATEGORÍA NUEVA
                const unsub = db.collection('inventory')
                    .where('isPromoted', '==', true) 
                    .onSnapshot(snap => {
                        const data = snap.docs.map(doc => doc.data());
                        setItems(data.filter(i => i.imageUrl));
                    });
                return () => unsub();
            }, []);

            const totalSlides = items.length > 0 
                ? items.length + Math.ceil(items.length / 4) 
                : 0;

            useEffect(() => {
                if (totalSlides > 0) {
                    const timer = setInterval(() => {
                        setCurrentIndex(prev => (prev + 1) % totalSlides);
                    }, 8000);
                    return () => clearInterval(timer);
                }
            }, [totalSlides]);

            const getTitleStyle = (text) => {
                const len = text.length;
                if (len < 8) return "text-[8vw]";
                if (len < 15) return "text-[6.5vw]";
                if (len < 22) return "text-[5vw]";
                return "text-[4.2vw]";
            };

            const enterFullscreen = () => {
                const elem = document.documentElement;
                if (elem.requestFullscreen) elem.requestFullscreen();
                setIsFullscreen(true);
            };

            if (!isFullscreen) {
                return (
                    <div className="h-screen w-screen flex flex-col items-center justify-center bg-oficina-dark text-white p-10 text-center">
                        <h2 className="text-4xl mb-8 font-black uppercase tracking-tighter">Terminal Inteligente Mandré</h2>
                        <button onClick={enterFullscreen} className="bg-oficina-verde text-white px-12 py-6 rounded-full text-2xl font-black border-4 border-white transition-all hover:scale-105">
                            INICIAR KIOSCO
                        </button>
                    </div>
                );
            }

            if (items.length === 0) {
                return (
                    <div className="h-screen w-screen flex items-center justify-center bg-oficina-dark text-white">
                        <div className="text-center animate-pulse text-2xl font-bold uppercase tracking-widest">Sincronizando Menú...</div>
                    </div>
                );
            }

            const isClubSlide = (currentIndex + 1) % 5 === 0 || currentIndex === totalSlides - 1;
            const itemIndex = currentIndex - Math.floor((currentIndex + 1) / 5);
            const current = items[itemIndex % items.length];
            
            const isSingleWord = current?.name && !current.name.trim().includes(" ");

            if (isClubSlide) {
                return (
                    <div className="h-screen w-screen bg-oficina-dark flex flex-col items-center justify-center text-center p-10 slide-enter">
                        <div className="mb-6 animate-bounce">
                            <svg className="w-[12vw] h-[12vw] text-oficina-verde mx-auto" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                                <path d="M7 7h.01M17 7h.01M7 17h.01M17 17h.01M12 7v10M7 12h10"></path>
                            </svg>
                        </div>
                        <h2 className="text-[7vw] font-black text-white uppercase leading-none mb-6 tracking-tighter">¡ÚNETE AL CLUB!</h2>
                        <p className="text-[3.2vw] text-oficina-verde font-bold mb-10 max-w-[80vw] leading-tight text-center">
                            Escanea el <span className="text-white underline">CÓDIGO QR</span> de tu mesa y accede a beneficios exclusivos.
                        </p>
                    </div>
                );
            }

            return (
                <div className="h-screen w-screen bg-pattern flex overflow-hidden">
                    <div className="w-1/2 tv-container z-10">
                        <div>
                            {/* EL KIOSKO LEERÁ AQUÍ: CAFE, COCKTAILS, CERVEZAS, ETC. */}
                            <span className="bg-oficina-verde text-white px-[1.5vw] py-[0.5vh] rounded-lg text-[1.4vw] font-bold uppercase tracking-widest">
                                {current.category}
                            </span>
                        </div>
                        
                        <div className="flex-grow flex flex-col justify-center overflow-hidden">
                            <h1 className={`
                                ${getTitleStyle(current.name)} 
                                ${isSingleWord ? 'single-word' : ''} 
                                font-[900] text-oficina-dark leading-[0.9] mb-[2vh] uppercase tracking-tighter no-word-break
                            `}>
                                {current.name}
                            </h1>
                            <p className="text-[2.2vw] text-oficina-verde/90 font-bold max-w-[90%] leading-tight">
                                {current.description || "Experiencia premium en cada preparación."}
                            </p>
                        </div>
                        
                        <div className="mt-auto">
                            <div className="text-[7.5vw] font-black text-oficina-verde price-tag leading-none mb-[4vh]">
                                ${current.price ? current.price.toLocaleString() : '0'}
                            </div>
                            <div className="flex items-center gap-[2vw] border-t-[0.3vw] border-oficina-verde pt-[3vh]">
                                <div className="bg-white p-[0.8vw] rounded-[1vw] shadow-xl">
                                    <img src={`https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=https://instagram.com/laoficinaanserma`} className="w-[7vw] h-[7vw]" alt="QR" />
                                </div>
                                <div>
                                    <p className="text-[1vw] font-bold text-oficina-dark/50 uppercase">Pide desde tu mesa</p>
                                    <p className="text-[2.2vw] font-black text-oficina-verde leading-none">@laoficinaanserma</p>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div className="w-1/2 relative h-full">
                        <div key={currentIndex} className="h-full w-full slide-enter">
                            <img src={current.imageUrl} className="h-full w-full object-cover" alt={current.name} />
                            <div className="absolute inset-0 bg-gradient-to-r from-[#e3e4d4] via-transparent to-transparent opacity-60"></div>
                            <div className="absolute inset-0 bg-gradient-to-r from-[#e3e4d4] w-[12%]"></div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<AdsDisplay />);
    </script>
</body>
</html>
