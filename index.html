<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TERMINAL INTELIGENTE | LA OFICINA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'oficina-verde': '#4b5320',
                        'oficina-dark': '#1a1c0b',
                    }
                }
            }
        }
    </script>

    <style>
        body, html { 
            margin: 0; 
            padding: 0; 
            overflow: hidden; 
            background-color: #1a1c0b;
            cursor: none;
            font-family: 'Montserrat', sans-serif;
            height: 100vh;
        }
        
        .slide-enter { animation: slideIn 0.8s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        .price-tag { text-shadow: 4px 4px 0px rgba(75, 83, 32, 0.2); }
        
        .bg-pattern {
            background-color: #e3e4d4;
            background-image: radial-gradient(#4b5320 0.5px, transparent 0.5px);
            background-size: 30px 30px;
        }

        .tv-container {
            height: 100vh;
            width: 100vw;
            padding: 5vh 5vw;
            display: flex;
            box-sizing: border-box;
            overflow: hidden;
        }

        .text-wrap-balance {
            text-wrap: balance;
            word-break: break-word;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyAutOqky0mpVmwDrqFsyZ0zRl_abrzgPvc",
            authDomain: "mandre-f9e43.firebaseapp.com",
            projectId: "mandre-f9e43",
            storageBucket: "mandre-f9e43.firebasestorage.app",
            messagingSenderId: "865403538422",
            appId: "1:865403538422:web:0ee2fb754343de9bc015d7"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const AdsDisplay = () => {
            const [items, setItems] = useState([]);
            const [currentIndex, setCurrentIndex] = useState(0);
            const [isFullscreen, setIsFullscreen] = useState(false);

            useEffect(() => {
                const unsub = db.collection('inventory')
                    .where('isPromoted', '==', true) 
                    .onSnapshot(snap => {
                        const data = snap.docs.map(doc => doc.data());
                        setItems(data.filter(i => i.imageUrl));
                    });
                return () => unsub();
            }, []);

            // LÓGICA DE INTERCALADO: 
            // Total = productos + 1 slide de Club por cada 4 productos (mínimo 1)
            const totalSlides = items.length > 0 
                ? items.length + Math.ceil(items.length / 4) 
                : 0;

            useEffect(() => {
                if (totalSlides > 0) {
                    const timer = setInterval(() => {
                        setCurrentIndex(prev => (prev + 1) % totalSlides);
                    }, 8000);
                    return () => clearInterval(timer);
                }
            }, [totalSlides]);

            // Inteligencia de Texto
            const getTitleStyle = (text) => {
                const len = text.length;
                if (len < 12) return "text-[8vw]";
                if (len < 22) return "text-[6vw]";
                return "text-[4.5vw]";
            };

            const enterFullscreen = () => {
                const elem = document.documentElement;
                if (elem.requestFullscreen) elem.requestFullscreen();
                setIsFullscreen(true);
            };

            if (!isFullscreen) {
                return (
                    <div className="h-screen w-screen flex flex-col items-center justify-center bg-oficina-dark text-white p-10 text-center">
                        <h2 className="text-4xl mb-8 font-black uppercase">Terminal Adaptativa de Alta Frecuencia</h2>
                        <button onClick={enterFullscreen} className="bg-oficina-verde text-white px-12 py-6 rounded-full text-2xl font-black border-4 border-white transition-all hover:scale-105">
                            INICIAR KIOSCO
                        </button>
                    </div>
                );
            }

            if (items.length === 0) {
                return (
                    <div className="h-screen w-screen flex items-center justify-center bg-oficina-dark text-white">
                        <div className="text-center animate-pulse text-2xl font-bold uppercase">Sincronizando con La Oficina...</div>
                    </div>
                );
            }

            // DETERMINAR SI ES SLIDE DE CLUB:
            // Cada 5 slots (1 club cada 4 productos) O si es el último slot en listas cortas
            const isClubSlide = (currentIndex + 1) % 5 === 0 || currentIndex === totalSlides - 1;
            
            // Calcular qué producto mostrar saltando los slots del Club
            const itemIndex = currentIndex - Math.floor((currentIndex + 1) / 5);
            const current = items[itemIndex % items.length];

            if (isClubSlide) {
                return (
                    <div className="h-screen w-screen bg-oficina-dark flex flex-col items-center justify-center text-center p-10 slide-enter">
                        <div className="mb-6 animate-bounce">
                            <svg className="w-[12vw] h-[12vw] text-oficina-verde mx-auto" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                                <path d="M7 7h.01M17 7h.01M7 17h.01M17 17h.01M12 7v10M7 12h10"></path>
                            </svg>
                        </div>
                        <h2 className="text-[7vw] font-black text-white uppercase leading-none mb-6 tracking-tighter">¡ÚNETE AL CLUB!</h2>
                        <p className="text-[3.2vw] text-oficina-verde font-bold mb-10 max-w-[80vw] leading-tight text-wrap-balance">
                            Escanea el <span className="text-white underline">CÓDIGO QR</span> de tu mesa y accede a <span className="text-white">promociones y descuentos exclusivos</span> para miembros.
                        </p>
                        <div className="bg-oficina-verde/20 border-2 border-oficina-verde px-10 py-4 rounded-3xl">
                             <p className="text-[1.8vw] font-black text-white uppercase tracking-[0.3em]">Beneficios de La Oficina</p>
                        </div>
                    </div>
                );
            }

            return (
                <div className="h-screen w-screen bg-pattern flex overflow-hidden">
                    <div className="w-1/2 tv-container flex-col justify-between z-10">
                        <div>
                            <span className="bg-oficina-verde text-white px-[1.5vw] py-[0.5vh] rounded-lg text-[1.4vw] font-bold uppercase">
                                {current.category}
                            </span>
                        </div>
                        
                        <div className="flex-grow flex flex-col justify-center">
                            <h1 className={`${getTitleStyle(current.name)} font-black text-oficina-dark leading-[0.85] mb-[2vh] uppercase tracking-tighter text-wrap-balance`}>
                                {current.name}
                            </h1>
                            <p className="text-[2.2vw] text-oficina-verde/90 font-bold max-w-[95%] leading-tight text-wrap-balance">
                                {current.description || "Experiencia premium en cada sorbo."}
                            </p>
                        </div>
                        
                        <div>
                            <div className="text-[7vw] font-black text-oficina-verde price-tag leading-none mb-[4vh]">
                                ${current.price ? current.price.toLocaleString() : '0'}
                            </div>
                            <div className="flex items-center gap-[2vw] border-t-[0.3vw] border-oficina-verde pt-[3vh]">
                                <div className="bg-white p-[0.8vw] rounded-[1vw] shadow-xl">
                                    <img src={`https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=https://instagram.com/laoficinaanserma`} className="w-[7vw] h-[7vw]" alt="QR" />
                                </div>
                                <div>
                                    <p className="text-[1vw] font-bold text-oficina-dark/50 uppercase">Escanea para pedir</p>
                                    <p className="text-[2.2vw] font-black text-oficina-verde leading-none">@laoficinaanserma</p>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div className="w-1/2 relative h-full">
                        <div key={currentIndex} className="h-full w-full slide-enter">
                            <img src={current.imageUrl} className="h-full w-full object-cover" alt={current.name} />
                            <div className="absolute inset-0 bg-gradient-to-r from-[#e3e4d4] via-transparent to-transparent opacity-50"></div>
                            <div className="absolute inset-0 bg-gradient-to-r from-[#e3e4d4] w-[10%]"></div>
                        </div>
                        <div className="absolute top-[5vh] right-[4vw] bg-white/95 p-[1.2vw] rounded-full shadow-2xl border-4 border-oficina-verde/10">
                             <svg className="w-[5vw] h-[5vw] text-oficina-verde" viewBox="0 0 200 220" fill="currentColor">
                                <path d="M40,95 h120 c0,0,0,60-60,60 S40,95,40,95 z" />
                                <path d="M160,105 c15,0,25,10,25,22 s-10,22-25,22" stroke="currentColor" fill="none" strokeWidth="12"/>
                            </svg>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<AdsDisplay />);
    </script>
</body>
</html>
