<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>TERMINAL PUBLICITARIA | LA OFICINA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'oficina-verde': '#4b5320',
                        'oficina-dark': '#1a1c0b',
                    }
                }
            }
        }
    </script>

    <style>
        /* Desactivar scroll y barras de navegación visuales */
        body, html { 
            margin: 0; 
            padding: 0; 
            overflow: hidden; 
            background-color: #1a1c0b;
            cursor: none; /* Oculta el puntero para modo kiosco */
        }
        
        .slide-enter { animation: slideIn 0.8s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        .price-tag { text-shadow: 2px 2px 0px #4B5320; }
        .bg-pattern {
            background-color: #e3e4d4;
            background-image: radial-gradient(#4b5320 0.5px, transparent 0.5px);
            background-size: 20px 20px;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyAutOqky0mpVmwDrqFsyZ0zRl_abrzgPvc",
            authDomain: "mandre-f9e43.firebaseapp.com",
            projectId: "mandre-f9e43",
            storageBucket: "mandre-f9e43.firebasestorage.app",
            messagingSenderId: "865403538422",
            appId: "1:865403538422:web:0ee2fb754343de9bc015d7"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const AdsDisplay = () => {
            const [items, setItems] = useState([]);
            const [currentIndex, setCurrentIndex] = useState(0);
            const [isFullscreen, setIsFullscreen] = useState(false);

            useEffect(() => {
                // ESCUCHA ACTIVA: Solo traemos los que el administrador marque como "isPromoted"
                const unsub = db.collection('inventory')
                    .where('isPromoted', '==', true) 
                    .onSnapshot(snap => {
                        const data = snap.docs.map(doc => doc.data());
                        setItems(data.filter(i => i.imageUrl));
                    });
                return () => unsub();
            }, []);

            const totalSlides = items.length > 0 ? items.length + Math.floor(items.length / 4) : 0;

            useEffect(() => {
                if (totalSlides > 0) {
                    const timer = setInterval(() => {
                        setCurrentIndex(prev => (prev + 1) % totalSlides);
                    }, 8000);
                    return () => clearInterval(timer);
                }
            }, [totalSlides]);

            const enterFullscreen = () => {
                const elem = document.documentElement;
                if (elem.requestFullscreen) elem.requestFullscreen();
                else if (elem.webkitRequestFullscreen) elem.webkitRequestFullscreen();
                setIsFullscreen(true);
            };

            if (!isFullscreen) {
                return (
                    <div className="h-screen w-screen flex flex-col items-center justify-center bg-oficina-dark text-white p-10">
                        <h2 className="text-3xl mb-8 font-bold">MODO PUBLICIDAD LISTO</h2>
                        <button 
                            onClick={enterFullscreen}
                            className="bg-oficina-verde hover:bg-white hover:text-oficina-dark text-white px-12 py-6 rounded-full text-2xl font-black transition-all border-4 border-white"
                        >
                            INICIAR PANTALLA COMPLETA
                        </button>
                        <p className="mt-6 text-oficina-verde uppercase tracking-widest">La Oficina Coffee Bar - Digital Display</p>
                    </div>
                );
            }

            if (items.length === 0) {
                return (
                    <div className="h-screen w-screen flex items-center justify-center bg-oficina-dark text-white">
                        <div className="text-center">
                            <div className="animate-spin rounded-full h-16 w-16 border-t-4 border-oficina-verde mx-auto mb-4"></div>
                            <p className="text-xl font-bold uppercase tracking-widest">Esperando configuración del administrador...</p>
                        </div>
                    </div>
                );
            }

            const isClubSlide = (currentIndex + 1) % 5 === 0;
            const itemIndex = currentIndex - Math.floor(currentIndex / 5);
            const current = items[itemIndex % items.length];

            if (isClubSlide) {
                return (
                    <div className="h-screen w-screen bg-oficina-dark flex flex-col items-center justify-center text-center p-20 slide-enter">
                        <div className="mb-8">
                             <svg className="w-40 h-40 text-oficina-verde mx-auto" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
                                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                                <path d="M7 7h.01M17 7h.01M7 17h.01M17 17h.01"></path>
                                <path d="M12 7v10M7 12h10"></path>
                             </svg>
                        </div>
                        <h2 className="text-8xl font-black text-white uppercase mb-8 tracking-tighter">¡MIRA TU MESA!</h2>
                        <p className="text-5xl text-oficina-verde font-bold mb-12 max-w-5xl leading-tight">
                            Escanea el <span className="text-white underline">CÓDIGO QR</span> que está en tu mesa para unirte al Club y recibir descuentos espectaculares en tus consumos.
                        </p>
                        <div className="border-4 border-oficina-verde p-8 rounded-3xl inline-block">
                             <p className="text-4xl font-black text-white uppercase tracking-widest">Registrarse es ganar</p>
                        </div>
                    </div>
                );
            }

            return (
                <div className="h-screen w-screen bg-pattern flex overflow-hidden">
                    <div className="w-1/2 p-16 flex flex-col justify-center z-10">
                        <div className="mb-6">
                            <span className="bg-oficina-verde text-white px-4 py-1 rounded-full text-xl font-bold tracking-widest uppercase">
                                {current.category}
                            </span>
                        </div>
                        <h1 className="text-7xl font-black text-oficina-dark leading-none mb-8 uppercase tracking-tighter">
                            {current.name}
                        </h1>
                        <p className="text-3xl text-oficina-verde/80 font-medium mb-12 max-w-lg">
                            {current.description || "Disfruta de lo mejor en LA OFICINA Coffee Bar."}
                        </p>
                        <div className="text-8xl font-black text-oficina-verde price-tag">
                            ${current.price ? current.price.toLocaleString() : '0'}
                        </div>
                        
                        <div className="mt-auto flex items-center gap-6 border-t-4 border-oficina-verde pt-8">
                            <div className="bg-white p-4 rounded-2xl shadow-xl">
                                <img src={`https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=https://instagram.com/laoficinaanserma`} alt="QR Instagram" />
                            </div>
                            <div>
                                <p className="text-xl font-bold text-oficina-dark uppercase">Síguenos y únete al club</p>
                                <p className="text-4xl font-black text-oficina-verde">
                                    <span className="text-2xl align-middle">@</span>laoficinaanserma
                                </p>
                            </div>
                        </div>
                    </div>

                    <div className="w-1/2 relative">
                        <div key={currentIndex} className="h-full w-full slide-enter">
                            <img 
                                src={current.imageUrl} 
                                className="h-full w-full object-cover shadow-[0_0_100px_rgba(0,0,0,0.2)]" 
                                alt={current.name} 
                            />
                            <div className="absolute inset-0 bg-gradient-to-r from-[#e3e4d4] via-transparent to-transparent"></div>
                        </div>
                    </div>

                    <div className="absolute top-10 right-10 bg-white/90 backdrop-blur p-6 rounded-full shadow-2xl">
                         <svg className="w-16 h-16 text-oficina-verde" viewBox="0 0 200 220" fill="currentColor">
                            <path d="M40,95 h120 c0,0,0,60-60,60 S40,95,40,95 z" />
                            <path d="M160,105 c15,0,25,10,25,22 s-10,22-25,22" stroke="currentColor" fill="none" strokeWidth="10"/>
                        </svg>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<AdsDisplay />);
    </script>
</body>
</html>
