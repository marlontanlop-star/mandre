<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EN OBRA | LA OFICINA</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">

    <script>
        // Configuración de Tailwind corregida
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            gold: '#C5A059', // Ejemplo de color para "La Oficina"
                            dark: '#1a1a1a'
                        }
                    }
                }
            }
        };
    </script>
</head>
<body class="bg-black text-white font-['Montserrat']">
    <div id="root"></div>

    <script type="text/babel">
        const App = () => {
            return (
                <div className="flex flex-col items-center justify-center h-screen">
                    <h1 className="text-5xl font-black mb-4">LA OFICINA</h1>
                    <p className="text-xl tracking-widest text-brand-gold uppercase">En Obra</p>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
