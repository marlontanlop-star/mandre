<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TERMINAL INTELIGENTE | LA OFICINA</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        /* CSS DISPUESTO PARA COMPATIBILIDAD TOTAL CON LG TV (SIN DEPENDER DE JS) */
        :root {
            --oficina-verde: #4b5320;
            --oficina-dark: #1a1c0b;
            --oficina-claro: #e3e4d4;
        }

        body, html { 
            margin: 0; padding: 0; overflow: hidden; 
            background-color: var(--oficina-dark); 
            font-family: 'Montserrat', sans-serif; height: 100vh;
        }

        /* Fondo de puntos original */
        .bg-pattern {
            background-color: var(--oficina-claro);
            background-image: radial-gradient(var(--oficina-verde) 0.5px, transparent 0.5px);
            background-size: 30px 30px;
            color: var(--oficina-dark);
            display: flex; height: 100vh; width: 100vw;
        }

        .tv-container {
            width: 50vw; height: 100vh; padding: 5vh 4vw;
            display: flex; flex-direction: column; justify-content: space-between;
            box-sizing: border-box; z-index: 10;
        }

        .price-tag { 
            text-shadow: 4px 4px 0px rgba(75, 83, 32, 0.2); 
            color: var(--oficina-verde); font-weight: 900; font-size: 7.5vw;
        }

        .category-badge {
            background-color: var(--oficina-verde); color: white;
            padding: 0.5vh 1.5vw; border-radius: 8px;
            font-size: 1.4vw; font-weight: bold; text-transform: uppercase;
        }

        /* Imagen y Gradientes originales */
        .image-side { width: 50vw; height: 100vh; position: relative; overflow: hidden; }
        .image-side img { width: 100%; height: 100%; object-fit: cover; }
        .gradient-overlay {
            position: absolute; inset: 0;
            background: linear-gradient(to right, var(--oficina-claro) 0%, transparent 20%);
        }

        /* Animación de entrada suave[cite: 2] */
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .slide-enter { animation: slideIn 0.8s cubic-bezier(0.4, 0, 0.2, 1) forwards; }

        .hidden { display: none !important; }
        .flex { display: flex; }
    </style>
</head>
<body>

    <!-- Pantalla de Inicio -->
    <div id="view-start" style="height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; background: var(--oficina-dark); color: white;">
        <h1 style="font-size: 3vw; font-weight: 900; margin-bottom: 2rem;">TERMINAL INTELIGENTE</h1>
        <button onclick="iniciar()" style="background: var(--oficina-verde); color: white; padding: 2vh 4vw; border-radius: 50px; border: 4px solid white; font-weight: 900; font-size: 1.5vw; cursor: pointer;">INICIAR KIOSCO</button>
    </div>

    <!-- Pantalla Principal de Productos[cite: 2] -->
    <div id="view-main" class="hidden bg-pattern">
        <div class="tv-container">
            <div><span id="ui-cat" class="category-badge">CATEGORIA</span></div>
            
            <div style="flex-grow: 1; display: flex; flex-direction: column; justify-content: center;">
                <h1 id="ui-name" style="line-height: 0.9; font-weight: 900; text-transform: uppercase; color: var(--oficina-dark);">NOMBRE</h1>
                <p id="ui-desc" style="font-size: 2.2vw; font-weight: 700; color: #4b5320; opacity: 0.9; margin-top: 2vh;">Descripción...</p>
            </div>
            
            <div>
                <div id="ui-price" class="price-tag">$0</div>
                <div style="display: flex; align-items: center; gap: 2vw; border-top: 0.3vw solid var(--oficina-verde); padding-top: 3vh;">
                    <div style="background: white; padding: 0.8vw; border-radius: 1vw; box-shadow: 0 10px 20px rgba(0,0,0,0.1);">
                        <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=https://instagram.com/laoficinaanserma" style="width: 7vw; height: 7vw;">
                    </div>
                    <div>
                        <p style="font-size: 1vw; font-weight: 700; opacity: 0.5; text-transform: uppercase; margin: 0;">Pide desde tu mesa</p>
                        <p style="font-size: 2.2vw; font-weight: 900; color: var(--oficina-verde); margin: 0;">@laoficinaanserma</p>
                    </div>
                </div>
            </div>
        </div>
        <div class="image-side">
            <img id="ui-img" class="slide-enter" src="">
            <div class="gradient-overlay"></div>
        </div>
    </div>

    <!-- Pantalla de Club[cite: 2] -->
    <div id="view-club" class="hidden" style="height: 100vh; width: 100vw; background: var(--oficina-dark); display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; color: white; padding: 5vw;">
        <h2 style="font-size: 7vw; font-weight: 900; margin-bottom: 2vh;">¡ÚNETE AL CLUB!</h2>
        <p style="font-size: 3.2vw; color: var(--oficina-verde); font-weight: 700; max-width: 80%;">Escanea el <span style="text-decoration: underline; color: white;">CÓDIGO QR</span> de tu mesa y accede a beneficios exclusivos.</p>
    </div>

    <script>
        var items = [];
        var currentIndex = 0;

        function iniciar() {
            var doc = document.documentElement;
            var r = doc.requestFullscreen || doc.webkitRequestFullScreen || doc.mozRequestFullScreen || doc.msRequestFullscreen;
            if (r) r.call(doc);
            
            document.getElementById('view-start').className = 'hidden';
            document.getElementById('view-main').className = 'bg-pattern flex';
            loadData();
        }

        // Conexión ultraligera para LG WebOS
        function loadData() {
            var xhr = new XMLHttpRequest();
            xhr.open("GET", "https://firestore.googleapis.com/v1/projects/mandre-f9e43/databases/(default)/documents/inventory", true);
            xhr.onreadystatechange = function() {
                if (xhr.readyState === 4 && xhr.status === 200) {
                    var data = JSON.parse(xhr.responseText);
                    items = [];
                    if (data.documents) {
                        for (var i = 0; i < data.documents.length; i++) {
                            var f = data.documents[i].fields;
                            if (f.isPromoted && f.isPromoted.booleanValue && f.imageUrl) {
                                items.push({
                                    name: f.name.stringValue,
                                    price: f.price ? (f.price.integerValue || f.price.doubleValue) : 0,
                                    desc: f.description ? f.description.stringValue : "",
                                    img: f.imageUrl.stringValue,
                                    cat: f.category ? f.category.stringValue : "MENÚ"
                                });
                            }
                        }
                    }
                    if (items.length > 0) loop();
                }
            };
            xhr.send();
        }

        function loop() {
            render();
            setInterval(function() {
                currentIndex = (currentIndex + 1) % (items.length + 1);
                render();
            }, 8000);
        }

        function render() {
            var isClub = currentIndex === items.length || (currentIndex > 0 && currentIndex % 5 === 0);
            
            if (isClub) {
                document.getElementById('view-main').className = 'hidden';
                document.getElementById('view-club').className = 'flex';
                document.getElementById('view-club').style.display = 'flex';
                document.getElementById('view-club').classList.add('slide-enter');
            } else {
                document.getElementById('view-club').className = 'hidden';
                document.getElementById('view-club').style.display = 'none';
                document.getElementById('view-main').className = 'bg-pattern flex';
                
                var data = items[currentIndex % items.length];
                
                document.getElementById('ui-cat').innerText = data.cat;
                document.getElementById('ui-name').innerText = data.name;
                document.getElementById('ui-desc').innerText = data.desc;
                document.getElementById('ui-price').innerText = "$" + Number(data.price).toLocaleString();
                
                var img = document.getElementById('ui-img');
                img.src = data.img;
                
                // Ajuste de tamaño dinámico de fuente[cite: 2]
                var n = data.name.length;
                var size = n < 8 ? "8vw" : n < 15 ? "6.5vw" : n < 22 ? "5vw" : "4.2vw";
                document.getElementById('ui-name').style.fontSize = size;
                
                // Reiniciar animación
                img.style.animation = 'none';
                img.offsetHeight; 
                img.style.animation = null;
            }
        }
    </script>
</body>
</html>
