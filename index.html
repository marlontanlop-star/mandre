<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TERMINAL INTELIGENTE | LA OFICINA</title>
    
    <!-- Polyfills para asegurar que navegadores de TV antiguos entiendan funciones modernas -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/core-js/3.33.0/minified.js"></script>

    <!-- Tailwind CSS (Se mantiene para la estética intacta) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React en versión de producción (Más rápido para el TV) -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Firebase Versión 8 (Máxima compatibilidad con Smart TVs, tu API de Firestore funciona igual) -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'oficina-verde': '#4b5320',
                        'oficina-claro': '#8FBC8F', 
                        'oficina-dark': '#1a1c0b',
                    },
                    animation: {
                        'float-slow': 'float 6s ease-in-out infinite',
                        'seal-entrance': 'sealPop 1s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards',
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0) rotate(-0.5deg)' },
                            '50%': { transform: 'translateY(-15px) rotate(0.5deg)' },
                        },
                        sealPop: {
                            '0%': { transform: 'scale(0) rotate(-45deg)', opacity: '0' },
                            '100%': { transform: 'scale(1) rotate(0deg)', opacity: '1' },
                        }
                    }
                }
            }
        }
    </script>

    <style>
        body, html { margin: 0; padding: 0; overflow: hidden; background-color: #1a1c0b; cursor: none; font-family: 'Montserrat', sans-serif; height: 100vh; }
        .slide-enter { animation: slideIn 0.8s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .price-tag { text-shadow: 4px 4px 0px rgba(75, 83, 32, 0.2); }
        .bg-pattern { background-color: #e3e4d4; background-image: radial-gradient(#4b5320 0.5px, transparent 0.5px); background-size: 30px 30px; }
        .tv-container { height: 100vh; width: 50vw; padding: 5vh 4vw; display: flex; flex-direction: column; box-sizing: border-box; overflow: hidden; }
        .no-word-break { white-space: normal; word-break: keep-all; overflow-wrap: normal; display: block; }
        .coffee-bag { background: linear-gradient(145deg, #1a1c0b 0%, #070803 100%); border: 1px solid rgba(143, 188, 143, 0.1); }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- Cambiamos type="text/babel" a "text/javascript" -->
    <script type="text/javascript">
        // Atajo para evitar escribir React.createElement y mantener el código sin necesidad de Babel
        const el = React.createElement;
        const { useState, useEffect } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyAutOqky0mpVmwDrqFsyZ0zRl_abrzgPvc",
            authDomain: "mandre-f9e43.firebaseapp.com",
            projectId: "mandre-f9e43",
            storageBucket: "mandre-f9e43.firebasestorage.app",
            messagingSenderId: "865403538422",
            appId: "1:865403538422:web:0ee2fb754343de9bc015d7"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const AdsDisplay = () => {
            const [items, setItems] = useState([]);
            const [tvConfig, setTvConfig] = useState(null); 
            const [currentIndex, setCurrentIndex] = useState(0);
            const [isFullscreen, setIsFullscreen] = useState(false);

            useEffect(() => {
                const unsub = db.collection('inventory').where('isPromoted', '==', true).onSnapshot(snap => {
                    setItems(snap.docs.map(doc => doc.data()).filter(i => i.imageUrl));
                });
                const unsubConfig = db.collection('configuracionTV').doc('actual').onSnapshot(doc => {
                    if (doc.exists) setTvConfig(doc.data());
                });
                return () => { unsub(); unsubConfig(); };
            }, []);

            const totalSlides = items.length > 0 ? items.length + Math.ceil(items.length / 4) : 0;

            useEffect(() => {
                if (totalSlides > 0) {
                    const isPromo = (currentIndex + 1) % 5 === 0 || currentIndex === totalSlides - 1;
                    const duration = isPromo ? 20000 : 8000; 

                    const timer = setTimeout(() => {
                        setCurrentIndex(prev => (prev + 1) % totalSlides);
                    }, duration);
                    return () => clearTimeout(timer);
                }
            }, [currentIndex, totalSlides]);

            const enterFullscreen = () => {
                const docEl = document.documentElement;
                if (docEl.requestFullscreen) {
                    docEl.requestFullscreen().catch(e => console.log(e));
                } else if (docEl.webkitRequestFullscreen) { // Safari/Chrome antiguos (Tizen/WebOS)
                    docEl.webkitRequestFullscreen();
                } else if (docEl.mozRequestFullScreen) { // Firefox
                    docEl.mozRequestFullScreen();
                }
                setIsFullscreen(true);
            };

            if (!isFullscreen) {
                return el("div", { className: "h-screen w-screen flex flex-col items-center justify-center bg-oficina-dark text-white p-10 text-center" },
                    el("h2", { className: "text-4xl mb-8 font-black uppercase tracking-tighter" }, "Terminal Inteligente Mandré"),
                    el("button", { onClick: enterFullscreen, className: "bg-oficina-verde text-white px-12 py-6 rounded-full text-2xl font-black border-4 border-white transition-all hover:scale-105" }, "INICIAR KIOSCO")
                );
            }

            if (items.length === 0) {
                return el("div", { className: "h-screen w-screen flex items-center justify-center bg-oficina-dark text-white text-2xl font-bold animate-pulse" }, "Sincronizando...");
            }

            const isPromoSlide = (currentIndex + 1) % 5 === 0 || currentIndex === totalSlides - 1;
            const itemIndex = currentIndex - Math.floor((currentIndex + 1) / 5);
            const current = items[itemIndex % items.length];

            if (isPromoSlide) {
                // Reemplazo seguro para los televisores de la sintaxis tvConfig?.cafePromocion
                const cafe = (tvConfig && tvConfig.cafePromocion) ? tvConfig.cafePromocion : {};
                const promoText = (tvConfig && tvConfig.publicidadRecurrente && tvConfig.publicidadRecurrente.textoConfigurable) ? tvConfig.publicidadRecurrente.textoConfigurable : "NUESTRAS MONTAÑAS ANSERMEÑAS";

                return el("div", { className: "h-screen w-screen bg-[#070803] flex items-center justify-center p-10 slide-enter overflow-hidden relative" },
                    el("div", { className: "flex w-full h-full items-center gap-8 relative z-10" },
                        el("div", { className: "w-[50%] flex flex-col justify-center space-y-6" },
                            el("div", { className: "border-l-[1.2vw] border-oficina-claro pl-8" },
                                el("p", { className: "text-[1.8vw] text-oficina-claro font-black uppercase tracking-tight mb-2" }, "Todas nuestras bebidas a base de café están elaboradas con:"),
                                el("h2", { className: "text-[4.5vw] font-black text-white uppercase leading-[0.85] tracking-tighter mb-4" }, "Café: " + promoText),
                                el("p", { className: "text-[1.8vw] text-oficina-claro font-black uppercase tracking-[0.3em]" }, "Trazabilidad Total")
                            ),
                            el("p", { className: "text-[2vw] text-gray-300 font-medium leading-tight italic max-w-[95%]" }, "\"Cada taza rinde homenaje al esfuerzo inalcanzable de nuestros campesinos en las Montañas Ansermeñas.\""),
                            el("div", { className: "grid grid-cols-2 gap-4 pt-2" },
                                el("div", { className: "bg-white/5 p-4 rounded-2xl border border-oficina-claro/20" },
                                    el("p", { className: "text-[0.8vw] text-oficina-claro font-bold uppercase tracking-widest" }, "Vereda"),
                                    el("p", { className: "text-[1.6vw] text-white font-black truncate" }, cafe.vereda || '---')
                                ),
                                el("div", { className: "bg-white/5 p-4 rounded-2xl border border-oficina-claro/20" },
                                    el("p", { className: "text-[0.8vw] text-oficina-claro font-bold uppercase tracking-widest" }, "Municipio"),
                                    el("p", { className: "text-[1.6vw] text-white font-black" }, "Anserma, Caldas")
                                ),
                                el("div", { className: "bg-white/5 p-4 rounded-2xl border border-oficina-claro/20" },
                                    el("p", { className: "text-[0.8vw] text-oficina-claro font-bold uppercase tracking-widest" }, "Altura"),
                                    el("p", { className: "text-[1.6vw] text-white font-black" }, cafe.altura || '---', " ", el("span", { className: "text-[0.9vw] opacity-50 font-bold" }, "MSNM"))
                                ),
                                el("div", { className: "bg-white/5 p-4 rounded-2xl border border-oficina-claro/20" },
                                    el("p", { className: "text-[0.8vw] text-oficina-claro font-bold uppercase tracking-widest" }, "Procesador"),
                                    el("p", { className: "text-[1.6vw] text-white font-black truncate uppercase" }, cafe.procesador || '---')
                                )
                            )
                        ),
                        el("div", { className: "w-[50%] flex justify-center items-center h-full relative" },
                            el("div", { className: "relative w-[36vw] h-[85vh] coffee-bag rounded-b-[70px] rounded-t-3xl flex flex-col items-center p-12 animate-float-slow border-2 border-oficina-claro/30 shadow-[0_0_80px_rgba(0,0,0,0.9)]" },
                                el("div", { className: "absolute -top-16 w-48 h-48 bg-white rounded-full shadow-[0_0_60px_rgba(143,188,143,0.4)] border-8 border-oficina-claro z-20 flex items-center justify-center p-4 animate-seal-entrance overflow-hidden" },
                                    cafe.logoUrl 
                                        ? el("img", { src: cafe.logoUrl, className: "w-full h-full object-contain", alt: "Sello Calidad" })
                                        : el("div", { className: "text-oficina-claro opacity-20" }, el("svg", { viewBox: "0 0 24 24", fill: "currentColor", width: "80" }, el("path", { d: "M12 2L2 7l10 5 10-5-10-5z" })))
                                ),
                                el("div", { className: "mt-20 w-full flex flex-col items-center flex-1" },
                                    el("div", { className: "text-center bg-oficina-claro p-6 rounded-[2.5rem] shadow-xl w-full mb-8" },
                                        el("p", { className: "text-oficina-dark font-black uppercase tracking-[0.3em] text-[0.9vw] mb-2 opacity-60" }, "Perfil de Taza"),
                                        el("p", { className: "text-[1.8vw] text-oficina-dark font-black leading-tight italic" }, "\"", cafe.notas || 'Notas equilibradas de alta montaña', "\"")
                                    ),
                                    el("div", { className: "bg-[#0a0b04] border-2 border-dashed border-oficina-claro/40 p-6 rounded-3xl text-center w-full" },
                                        el("p", { className: "text-oficina-claro font-bold uppercase text-[1vw] tracking-[0.2em] mb-1" }, "Día de Tueste"),
                                        el("p", { className: "text-white font-black text-[2.5vw]" }, cafe.diaTueste ? cafe.diaTueste.split('-').reverse().join('/') : 'RECIENTE')
                                    )
                                ),
                                el("div", { className: "mt-auto flex items-center gap-4 bg-white/5 p-4 rounded-3xl border border-white/10 w-full" },
                                    el("div", { className: "bg-white p-2 rounded-xl" },
                                        el("img", { src: "https://api.qrserver.com/v1/create-qr-code/?size=100x100&data=https://instagram.com/laoficinaanserma", className: "w-16 h-16", alt: "QR" })
                                    ),
                                    el("div", null,
                                        el("p", { className: "text-oficina-claro font-black text-[1.2vw] leading-none uppercase" }, "@laoficinaanserma"),
                                        el("p", { className: "text-[0.7vw] text-gray-400 font-bold uppercase tracking-widest mt-1 italic" }, "Sigue la historia")
                                    )
                                )
                            )
                        )
                    )
                );
            }

            const getTitleStyle = (text) => text.length < 8 ? "text-[8vw]" : text.length < 15 ? "text-[6.5vw]" : text.length < 22 ? "text-[5vw]" : "text-[4.2vw]";
            
            return el("div", { className: "h-screen w-screen bg-pattern flex overflow-hidden" },
                el("div", { className: "w-1/2 tv-container z-10" },
                    el("div", null, el("span", { className: "bg-oficina-verde text-white px-[1.5vw] py-[0.5vh] rounded-lg text-[1.4vw] font-bold uppercase tracking-widest" }, current.category)),
                    el("div", { className: "flex-grow flex flex-col justify-center overflow-hidden pr-8" },
                        el("h1", { className: getTitleStyle(current.name) + " font-[900] text-oficina-dark leading-[0.9] mb-[2vh] uppercase tracking-tighter no-word-break" }, current.name),
                        el("p", { className: "text-[2.2vw] text-oficina-verde/90 font-bold max-w-[95%] leading-tight" }, current.description || "Experiencia premium en cada preparación.")
                    ),
                    el("div", { className: "mt-auto" },
                        el("div", { className: "text-[7.5vw] font-black text-oficina-verde price-tag leading-none mb-[4vh]" }, "$" + (current.price ? current.price.toLocaleString() : '')),
                        el("div", { className: "flex items-center gap-[2vw] border-t-[0.3vw] border-oficina-verde pt-[3vh]" },
                            el("div", { className: "bg-white p-[0.8vw] rounded-[1vw] shadow-xl" },
                                el("img", { src: "https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=https://instagram.com/laoficinaanserma", className: "w-[7vw] h-[7vw]" })
                            ),
                            el("div", null,
                                el("p", { className: "text-[1vw] font-bold text-oficina-dark/50 uppercase" }, "SIGUENOS EN INSTAGRAM"),
                                el("p", { className: "text-[2.2vw] font-black text-oficina-verde leading-none" }, "@laoficinaanserma")
                            )
                        )
                    )
                ),
                el("div", { className: "w-1/2 relative h-full" },
                    el("div", { key: currentIndex, className: "h-full w-full slide-enter" },
                        el("img", { src: current.imageUrl, className: "h-full w-full object-cover" }),
                        el("div", { className: "absolute inset-0 bg-gradient-to-r from-[#e3e4d4] via-transparent to-transparent opacity-60" }),
                        el("div", { className: "absolute inset-0 bg-gradient-to-r from-[#e3e4d4] w-[12%]" })
                    )
                )
            );
        };

        const rootNode = document.getElementById('root');
        if (ReactDOM.createRoot) {
            ReactDOM.createRoot(rootNode).render(el(AdsDisplay));
        } else {
            // Fallback por si la TV no soporta la API de React 18
            ReactDOM.render(el(AdsDisplay), rootNode);
        }
    </script>
</body>
</html>
