<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LA OFICINA - EN OBRA</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;300;400;500;700&display=swap" rel="stylesheet">

    <style>
        /* VARIABLES DE COLOR */
        :root {
            --bg-color: #E4E6D9; /* Fondo claro crema/verdoso */
            --text-color: #445132; /* Verde oliva oscuro */
        }

        /* RESET Y CONFIGURACIÓN PARA TV */
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100vh;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Montserrat', sans-serif;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* PATRÓN DE FONDO SUTIL */
        .bg-pattern {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0.05;
            background-image: radial-gradient(var(--text-color) 2px, transparent 2px);
            background-size: 4vw 4vw;
            z-index: 0;
        }

        /* CINTAS DE PRECAUCIÓN (ESTÉTICA MINIMALISTA) */
        .tape-container {
            position: absolute;
            width: 120%;
            height: 8vh;
            z-index: 20;
            display: flex;
            align-items: center;
            justify-content: space-around;
            background-color: var(--bg-color);
            background-image: repeating-linear-gradient(-45deg, var(--text-color), var(--text-color) 30px, transparent 30px, transparent 60px);
            border-top: 2px solid var(--text-color);
            border-bottom: 2px solid var(--text-color);
            box-shadow: 0 1vh 3vh rgba(68, 81, 50, 0.15);
            animation: moveStripes 4s linear infinite;
        }
        
        .tape-top { top: 8vh; left: -10%; transform: rotate(-2deg); }
        .tape-bottom { bottom: 8vh; left: -10%; transform: rotate(2deg); }
        
        .tape-text {
            background-color: rgba(228, 230, 217, 0.95); /* Fondo crema con leve transparencia para ver las franjas */
            width: 100%;
            padding: 1.5vh 0;
            display: flex;
            justify-content: space-around;
            align-items: center;
            color: var(--text-color);
            font-weight: 700;
            font-size: 2vw;
            text-transform: uppercase;
            letter-spacing: 0.5vw;
            white-space: nowrap;
            border-top: 1px solid var(--text-color);
            border-bottom: 1px solid var(--text-color);
        }

        /* CONTENEDOR PRINCIPAL */
        .main-container {
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            width: 80%;
            max-width: 1800px;
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(68, 81, 50, 0.1);
            padding: 8vh 5vw;
            border-radius: 3vw;
            box-shadow: 0 2vw 4vw rgba(68, 81, 50, 0.08);
        }

        /* TEXTOS */
        .title {
            font-size: 8.5vw;
            font-weight: 300; /* Peso ligero para ser minimalista */
            margin: 0;
            letter-spacing: -1px;
            line-height: 1;
        }

        .subtitle {
            font-size: 2vw;
            font-weight: 400;
            letter-spacing: 1vw;
            margin: 2vh 0 7vh 0;
        }

        /* BARRA DE CARGA MINIMALISTA */
        .loading-wrapper {
            width: 90%;
            margin: 3vh 0;
        }

        .loading-text {
            font-size: 2vw;
            font-weight: 500;
            margin-bottom: 2vh;
            letter-spacing: 3px;
        }

        .progress-container {
            width: 100%;
            height: 1.5vh; /* Barra más delgada */
            background-color: rgba(68, 81, 50, 0.15);
            border-radius: 50px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background-color: var(--text-color);
            border-radius: 50px;
            animation: loadProgress 3s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        .apertura-text {
            font-size: 3.5vw;
            font-weight: 700;
            margin: 7vh 0 4vh 0;
            text-transform: uppercase;
            letter-spacing: 0.2vw;
            animation: pulseText 2.5s infinite;
        }

        /* INSTAGRAM ESTILO OUTLINE */
        .ig-box {
            display: flex;
            align-items: center;
            gap: 1vw;
            padding: 1.5vh 3vw;
            background: transparent;
            border-radius: 50px;
            border: 1px solid var(--text-color);
        }

        .ig-icon {
            width: 3vh;
            height: 3vh;
            fill: var(--text-color);
        }

        .ig-handle {
            font-size: 2vw;
            font-weight: 400;
            letter-spacing: 1px;
        }

        /* ANIMACIONES */
        @keyframes moveStripes {
            0% { background-position: 0 0; }
            100% { background-position: 60px 0; }
        }

        @keyframes loadProgress {
            0% { width: 0%; }
            100% { width: 90%; }
        }

        @keyframes pulseText {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(1.02); }
        }
    </style>
</head>
<body>

    <div class="bg-pattern"></div>

    <div class="tape-container tape-top">
        <div class="tape-text">
            <span>PRECAUCIÓN EN OBRA</span> <span>•</span>
            <span>PRECAUCIÓN EN OBRA</span> <span>•</span>
            <span>PRECAUCIÓN EN OBRA</span>
        </div>
    </div>

    <div class="tape-container tape-bottom">
        <div class="tape-text">
            <span>CASI LISTOS</span> <span>•</span>
            <span>CASI LISTOS</span> <span>•</span>
            <span>CASI LISTOS</span> <span>•</span>
            <span>CASI LISTOS</span>
        </div>
    </div>

    <div class="main-container">
        
        <h1 class="title">LA OFICINA</h1>
        <h2 class="subtitle">COFFEE BAR</h2>

        <div class="loading-wrapper">
            <div class="loading-text">90% DE LA OBRA COMPLETADA</div>
            <div class="progress-container">
                <div class="progress-fill"></div>
            </div>
        </div>

        <div class="apertura-text">
            ¡Mañana 1 de Mayo abrimos!
        </div>

        <div class="ig-box">
            <svg class="ig-icon" viewBox="0 0 24 24">
                <path d="M7.8,2H16.2C19.4,2 22,4.6 22,7.8V16.2A5.8,5.8 0 0,1 16.2,22H7.8C4.6,22 2,19.4 2,16.2V7.8A5.8,5.8 0 0,1 7.8,2M7.6,4A3.6,3.6 0 0,0 4,7.6V16.4C4,18.39 5.61,20 7.6,20H16.4A3.6,3.6 0 0,0 20,16.4V7.6C20,5.61 18.39,4 16.4,4H7.6M12,6.75A5.25,5.25 0 1,1 6.75,12A5.25,5.25 0 0,1 12,6.75M12,9A3,3 0 1,0 15,12A3,3 0 0,0 12,9M17.25,5.5A1.25,1.25 0 1,1 16,6.75A1.25,1.25 0 0,1 17.25,5.5Z" />
            </svg>
            <span class="ig-handle">@laoficinaanserma</span>
        </div>

    </div>

</body>
</html>
